<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode — CF Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b27;
      --border:  #21293d;
      --brand:   #6366f1;
      --text:    #e6edf3;
      --text2:   #7d8590;
      --muted:   #3d4a5c;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* Very subtle top glow - brand color, not alarming red */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 440px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ── Top nav ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 48px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      background: var(--brand);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 11px;
      color: white;
      letter-spacing: -0.5px;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    /* ── Status badge ── */
    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 100px;
      padding: 5px 12px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: #a5b4fc;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .mode-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--brand);
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── Icon ── */
    .icon-wrap {
      width: 64px;
      height: 64px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      color: #a5b4fc;
    }

    /* ── Heading ── */
    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 12px;
      text-align: center;
    }

    .headline-accent {
      color: var(--brand);
    }

    .subtitle {
      font-size: 15px;
      color: var(--text2);
      line-height: 1.6;
      text-align: center;
      margin-bottom: 40px;
    }

    .site-name {
      font-weight: 600;
      color: var(--text);
    }

    /* ── Quote ── */
    .quote-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 28px;
      text-align: left;
    }

    .quote-eyebrow {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .quote-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.75;
      font-style: italic;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 11px 16px;
      border-radius: 9px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
      letter-spacing: -0.1px;
    }
    .btn:active { transform: scale(0.97); }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: var(--surface);
      border-color: #2d3a52;
      color: var(--text);
    }

    .btn-brand {
      background: var(--brand);
      color: white;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .btn-brand:hover {
      background: #4f52e0;
    }

    /* ── Footer ── */
    .footer-note {
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="brand-logo">CF</div>
        <span class="brand-name">CF Focus</span>
      </div>
    </div>

    <div style="text-align:center">
      <div class="mode-badge">
        <div class="mode-dot"></div>
        Focus Mode Active
      </div>
    </div>

    <div class="icon-wrap">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="5.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="2" fill="currentColor"/>
        <line x1="12" y1="2.5" x2="12" y2="4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="19.5" x2="12" y2="21.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2.5" y1="12" x2="4.5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="19.5" y1="12" x2="21.5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Stay <span class="headline-accent">focused.</span></h1>

    <p class="subtitle" id="subText">
      You're in focus mode.<br>
      Trust your skills — you're stronger than you think.
    </p>

    <div class="quote-wrap">
      <div class="quote-eyebrow">Quote of the session</div>
      <p class="quote-text" id="quote"></p>
    </div>

    <div class="actions">
      <a class="btn btn-ghost" onclick="history.back(); return false;" href="#">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M10 12.5L5.5 8 10 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Go back
      </a>
      <a class="btn btn-brand" href="https://codeforces.com" target="_blank">
        Open Codeforces
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M6 3.5L10.5 8 6 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <p class="footer-note" id="footerNote">
      CF Focus is active while a practice tab is open
    </p>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fromSite = params.get('from');
    if (fromSite) {
      document.getElementById('subText').innerHTML =
        `<span class="site-name">${fromSite}</span> is paused during focus mode.<br>Trust your skills — you're stronger than you think.`;
    }

    const quotes = [
      '"The expert in anything was once a beginner who refused to give up."',
      '"Every problem you solve without AI is a skill you actually own."',
      '"Struggling with a problem is the feeling of your brain getting stronger."',
      '"The only way to get better at DSA is to do DSA."',
      '"Competitive programmers don\'t Google their way through a contest."',
      '"Hard problems require hard thinking, not easy answers."',
      '"You opened Codeforces to practice. So practice."',
      '"The discomfort of not knowing is exactly where growth lives."',
    ];
    document.getElementById('quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
  </script>
</body>
</html>

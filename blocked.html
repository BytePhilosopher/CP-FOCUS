<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode — CF Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #080808;
      --s1:    #0e0e0e;
      --s2:    #141414;
      --b1:    #1a1a1a;
      --b2:    #252525;
      --red:   #c8191c;
      --red-d: rgba(200,25,28,0.08);
      --red-m: rgba(200,25,28,0.22);
      --white: #ffffff;
      --text:  #f0f0f0;
      --text2: #777777;
      --muted: #333333;
      --dim: rgba(255,255,255,0.08);
      --mono:  'JetBrains Mono', monospace;
      --sans:  'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* Subtle radial glow at top */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 280px;
      background: radial-gradient(ellipse at 50% 0%, rgba(200,25,28,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 460px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 44px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand-logo {
      width: 28px; height: 28px;
      background: #ffffff;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 11px;
      color: #000000;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    /* ── Session card ── */
    #sessionCard {
      display: none;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 32px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .session-card-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .session-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text);
    }

    .session-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ffffff;
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .session-card-sub {
      font-size: 11px;
      color: var(--text2);
      font-family: var(--mono);
    }

    .session-timer-big {
      font-family: var(--mono);
      font-size: 40px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
      flex-shrink: 0;
    }

    .hc-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--red);
      background: var(--red-d);
      border: 1px solid var(--red-m);
      padding: 3px 9px;
      border-radius: 100px;
      width: fit-content;
    }

    /* ── Stop icon ── */
    .stop-icon {
      width: 64px; height: 64px;
      background: var(--red-d);
      border: 1px solid var(--red-m);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      color: var(--red);
    }

    /* ── Headline ── */
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1.3px;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 10px;
      text-align: center;
    }

    .headline-accent { color: var(--red); }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 15px;
      color: var(--text2);
      line-height: 1.65;
      text-align: center;
      margin-bottom: 10px;
    }

    /* ── Site badge ── */
    #siteBadgeWrap {
      display: none;
      text-align: center;
      margin-bottom: 28px;
    }

    #siteBadge {
      display: inline-block;
      background: var(--red-d);
      border: 1px solid var(--red-m);
      border-radius: 100px;
      padding: 4px 12px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--red);
      letter-spacing: 0.3px;
    }

    /* ── Quote card ── */
    .quote-wrap {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 28px;
      text-align: left;
    }

    .quote-eyebrow {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .quote-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.8;
      font-style: italic;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      padding: 13px 22px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.15s ease;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #ffffff;
      color: #000000;
    }
    .btn-primary:hover { background: #e8e8e8; }

    .btn-solved {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      font-weight: 500;
    }
    .btn-solved:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
    }

    /* ── Success state ── */
    .success-msg {
      display: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 18px 22px;
      text-align: center;
      margin-bottom: 28px;
    }

    .success-msg-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      letter-spacing: -0.3px;
    }

    .success-msg-sub {
      font-size: 12px;
      color: var(--text2);
      font-family: var(--mono);
    }

    /* ── Footer note ── */
    .footer-note {
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="brand-logo">CF</div>
        <span class="brand-name">CF Focus</span>
      </div>
    </div>

    <!-- Session timer card — shown when a focus session is active -->
    <div id="sessionCard">
      <div class="session-card-left">
        <div class="session-pill">
          <div class="session-dot"></div>
          Focus Session
        </div>
        <div class="session-card-sub">remaining in session</div>
        <div class="hc-badge" id="hcBadge">
          Hardcore &mdash; stay strong
        </div>
      </div>
      <div class="session-timer-big" id="sessionTimerBig">--:--</div>
    </div>

    <!-- Stop icon -->
    <div class="stop-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="1.6"/>
        <rect x="8.5" y="8.5" width="7" height="7" rx="1" fill="currentColor" opacity="0.85"/>
      </svg>
    </div>

    <h1>Solve it <span class="headline-accent">yourself.</span></h1>

    <p class="subtitle" id="subText">
      You're about to use AI.<br>Try harder first &mdash; that struggle is where growth lives.
    </p>

    <div id="siteBadgeWrap">
      <span id="siteBadge"></span>
    </div>

    <div class="quote-wrap">
      <div class="quote-eyebrow">Reminder</div>
      <p class="quote-text" id="quote"></p>
    </div>

    <div class="actions" id="actions">
      <button class="btn btn-primary" id="goBackBtn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M10 12.5L5.5 8 10 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Go back to problem
      </button>
      <button class="btn btn-solved" id="solvedBtn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M2.5 8.5l3.5 3.5 7-8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        I solved it &mdash; unlock AI for 10 min
      </button>
    </div>

    <div class="success-msg" id="successMsg">
      <div class="success-msg-title" id="successTitle">Problem marked as solved!</div>
      <div class="success-msg-sub" id="successSub">Redirecting&hellip;</div>
    </div>

    <p class="footer-note" id="footerNote">
      CF Focus is active while a practice tab is open
    </p>

  </div>

  <script src="blocked.js"></script>
</body>
</html>

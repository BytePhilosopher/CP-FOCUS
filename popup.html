<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CF Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161a22;
      --border: #2a2f3d;
      --accent: #e53e3e;
      --accent-dim: rgba(229, 62, 62, 0.12);
      --green: #48bb78;
      --green-dim: rgba(72, 187, 120, 0.12);
      --amber: #ed8936;
      --amber-dim: rgba(237, 137, 54, 0.12);
      --text: #e8eaf0;
      --muted: #6b7280;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
    }

    .header-text { flex: 1; }
    .header-text h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
    .header-text p  { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 7px;
      line-height: 1;
      transition: border-color 0.2s, color 0.2s;
    }
    .icon-btn:hover { border-color: #4a5568; color: var(--text); }

    /* ── Status card ── */
    .status-card {
      margin: 12px 14px 0;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.3s ease;
    }
    .status-card.active  { border-color: rgba(229,62,62,0.4);  background: var(--accent-dim); }
    .status-card.inactive { border-color: rgba(72,187,120,0.3); background: var(--green-dim); }
    .status-card.snoozed { border-color: rgba(237,137,54,0.4); background: var(--amber-dim); }

    .status-top { display: flex; align-items: center; justify-content: space-between; }
    .status-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .status-dot.active  { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.5s ease-in-out infinite; }
    .status-dot.inactive { background: var(--green); }
    .status-dot.snoozed { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .status-main { margin-top: 6px; font-size: 16px; font-weight: 600; letter-spacing: -0.4px; }
    .status-main.active  { color: #fc8181; }
    .status-main.inactive { color: var(--green); }
    .status-main.snoozed { color: #f6ad55; }

    .status-sub { margin-top: 2px; font-size: 11px; color: var(--muted); font-family: var(--mono); }

    /* ── Snooze row ── */
    .snooze-row {
      margin: 10px 14px 0;
      display: flex;
      gap: 6px;
    }

    .snooze-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      padding: 7px 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .snooze-btn:hover { border-color: var(--amber); color: #f6ad55; }
    .snooze-btn.end-snooze { border-color: rgba(237,137,54,0.4); color: #f6ad55; }
    .snooze-btn.end-snooze:hover { border-color: var(--amber); }

    /* ── Stats row ── */
    .stats-row {
      margin: 10px 14px 0;
      padding: 10px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      display: flex;
      align-items: center;
    }

    .stat { flex: 1; text-align: center; }
    .stat-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text); }
    .stat-val.highlight { color: var(--amber); }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.3px; }
    .stat-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

    /* ── Footer ── */
    .footer {
      margin-top: 10px;
      padding: 8px 14px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-note { font-size: 10px; color: var(--muted); font-family: var(--mono); }

    .open-cf-btn {
      font-size: 11px;
      font-family: var(--sans);
      font-weight: 500;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
    }
    .open-cf-btn:hover { border-color: var(--accent); color: #fc8181; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">CF</div>
    <div class="header-text">
      <h1>CF Focus</h1>
      <p>AI Blocker for Competitive Programming</p>
    </div>
    <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
  </div>

  <div class="status-card" id="statusCard">
    <div class="status-top">
      <span class="status-label">Status</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="status-main" id="statusMain">Checking...</div>
    <div class="status-sub" id="statusSub">scanning open tabs</div>
  </div>

  <div class="snooze-row" id="snoozeRow" style="display:none">
    <button class="snooze-btn" id="snoozeBtn">Snooze 15m</button>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="streakVal">—</div>
      <div class="stat-label">streak</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="sessionsVal">—</div>
      <div class="stat-label">sessions</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="minutesVal">—</div>
      <div class="stat-label">min focus</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-note" id="footerNote">open a focus platform to activate</span>
    <a class="open-cf-btn" href="https://codeforces.com" target="_blank">Open CF →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>

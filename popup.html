<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CF Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b27;
      --surface-hi: #1c2333;
      --border:     #21293d;
      --brand:      #6366f1;
      --brand-dim:  rgba(99, 102, 241, 0.12);
      --brand-glow: rgba(99, 102, 241, 0.3);
      --red:        #f43f5e;
      --red-dim:    rgba(244, 63, 94, 0.1);
      --green:      #10b981;
      --green-dim:  rgba(16, 185, 129, 0.1);
      --amber:      #f59e0b;
      --amber-dim:  rgba(245, 158, 11, 0.1);
      --text:       #e6edf3;
      --text2:      #7d8590;
      --muted:      #3d4a5c;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Inter', sans-serif;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 30px;
      height: 30px;
      background: var(--brand);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 12px;
      color: white;
      flex-shrink: 0;
      letter-spacing: -0.5px;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.4), 0 2px 8px rgba(99,102,241,0.25);
    }

    .header-info { flex: 1; min-width: 0; }
    .header-info h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .header-info p {
      font-size: 10px;
      color: var(--text2);
      margin-top: 1px;
      font-family: var(--mono);
    }

    .settings-btn {
      width: 28px;
      height: 28px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .settings-btn:hover {
      background: var(--surface);
      border-color: #2d3a52;
      color: var(--text);
    }

    /* ── Status card ── */
    .status-wrap { padding: 10px 12px 0; }

    .status-card {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color 0.35s ease, background 0.35s ease;
      cursor: default;
    }
    .status-card.active  {
      border-color: rgba(244, 63, 94, 0.3);
      background: rgba(244, 63, 94, 0.06);
    }
    .status-card.inactive {
      border-color: rgba(16, 185, 129, 0.25);
      background: rgba(16, 185, 129, 0.06);
    }
    .status-card.snoozed {
      border-color: rgba(245, 158, 11, 0.3);
      background: rgba(245, 158, 11, 0.06);
    }

    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .status-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 100px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.35s ease;
    }
    .status-pill.active {
      background: rgba(244, 63, 94, 0.12);
      color: #fb7185;
    }
    .status-pill.inactive {
      background: rgba(16, 185, 129, 0.12);
      color: #34d399;
    }
    .status-pill.snoozed {
      background: rgba(245, 158, 11, 0.12);
      color: #fbbf24;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .status-pill.active .status-dot { animation: pulse 1.8s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-body {}

    .status-main {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.6px;
      line-height: 1;
      margin-bottom: 4px;
      transition: color 0.35s ease;
    }
    .status-main.active   { color: #fb7185; }
    .status-main.inactive { color: #34d399; }
    .status-main.snoozed  { color: #fbbf24; }

    .status-sub {
      font-size: 11px;
      color: var(--text2);
      font-family: var(--mono);
    }

    /* ── Snooze button ── */
    .snooze-wrap { padding: 7px 12px 0; }

    .snooze-btn {
      width: 100%;
      padding: 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.1px;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .snooze-btn:hover {
      background: var(--surface-hi);
      border-color: rgba(245, 158, 11, 0.4);
      color: #fbbf24;
    }
    .snooze-btn:active { transform: scale(0.98); }
    .snooze-btn.end-snooze {
      background: rgba(245, 158, 11, 0.08);
      border-color: rgba(245, 158, 11, 0.3);
      color: #fbbf24;
    }
    .snooze-btn.end-snooze:hover {
      background: rgba(245, 158, 11, 0.14);
      border-color: rgba(245, 158, 11, 0.5);
    }

    /* ── Stats ── */
    .stats-wrap { padding: 7px 12px 0; }

    .stats-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
    }

    .stat {
      flex: 1;
      padding: 10px 4px;
      text-align: center;
      cursor: default;
      transition: background 0.15s;
      position: relative;
    }
    .stat:hover { background: var(--surface-hi); }
    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: var(--border);
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1;
      transition: color 0.2s;
    }
    .stat-val.highlight { color: var(--brand); }

    .stat-label {
      font-size: 9px;
      color: var(--text2);
      margin-top: 4px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 10px;
      padding: 9px 14px 13px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .footer-note {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cf-btn {
      font-size: 11px;
      font-family: var(--sans);
      font-weight: 500;
      background: var(--brand-dim);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cf-btn:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.4);
      color: #c7d2fe;
    }
    .cf-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">CF</div>
    <div class="header-info">
      <h1>CF Focus</h1>
      <p>Competitive Programming</p>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Settings">
      <svg width="13" height="13" viewBox="0 0 20 20" fill="none">
        <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M17.3 8.3 16 7.6l.5-1.5-2.2-1.3-1 1.2-1.4-.4-.5-1.6H9l-.5 1.6-1.4.4-1-1.2L3.9 6.1l.5 1.5-1.3.7v2.4l1.3.7-.5 1.5L6 14.2l1-1.2 1.4.4.5 1.6h2.4l.5-1.6 1.4-.4 1 1.2 2.2-1.3-.5-1.5 1.3-.7V8.3Z" stroke="currentColor" stroke-width="1.3"/>
      </svg>
    </button>
  </div>

  <div class="status-wrap">
    <div class="status-card" id="statusCard">
      <div class="status-header">
        <span class="status-label">Focus Status</span>
        <div class="status-pill" id="statusState">
          <div class="status-dot"></div>
          <span id="statusStateText">—</span>
        </div>
      </div>
      <div class="status-body">
        <div class="status-main" id="statusMain">Loading…</div>
        <div class="status-sub" id="statusSub">checking open tabs</div>
      </div>
    </div>
  </div>

  <div class="snooze-wrap" id="snoozeRow" style="display:none">
    <button class="snooze-btn" id="snoozeBtn">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8 4.5V8l2.5 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Snooze 15m
    </button>
  </div>

  <div class="stats-wrap">
    <div class="stats-row">
      <div class="stat">
        <div class="stat-val" id="streakVal">—</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sessionsVal">—</div>
        <div class="stat-label">Sessions</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="minutesVal">—</div>
        <div class="stat-label">Minutes</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-note" id="footerNote">open a focus platform to activate</span>
    <a class="cf-btn" href="https://codeforces.com" target="_blank">Open CF →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
